<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 30 — Final Project: Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
    .todo-app { max-width: 760px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 2rem; color: #1a1a2e; }
    .stats { color: #666; font-size: 0.9em; margin-top: 6px; }
    .add-todo { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .add-todo input, .add-todo select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    #todo-input { flex: 1; min-width: 200px; }
    #add-btn { padding: 10px 20px; background: #4361ee; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    #add-btn:hover { background: #3046cc; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    #search-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; }
    .filters { display: flex; gap: 4px; }
    .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { background: #4361ee; color: white; border-color: #4361ee; }
    #clear-btn { padding: 6px 14px; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    #todo-list li { background: white; padding: 14px 16px; border-radius: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-wrap: wrap; }
    #todo-list li.done .todo-text { text-decoration: line-through; color: #aaa; }
    #todo-list li.overdue { border-left: 3px solid red; }
    .toggle-btn, .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 2px 6px; border-radius: 4px; }
    .toggle-btn:hover, .edit-btn:hover, .delete-btn:hover { background: #f0f0f0; }
    .todo-text { flex: 1; font-size: 1rem; }
    .priority-badge { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .due-date { font-size: 0.78rem; color: #888; }
    .tag { font-size: 0.75rem; background: #e8f0fe; color: #4361ee; padding: 2px 8px; border-radius: 12px; }
    .edit-input { flex: 1; padding: 4px 8px; border: 1px solid #4361ee; border-radius: 4px; font-size: 1rem; }
    .hidden { display: none; }
    #empty-state { text-align: center; color: #aaa; padding: 40px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="index.js"></script>
</body>
</html>
