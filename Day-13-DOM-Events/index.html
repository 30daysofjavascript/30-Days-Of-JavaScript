<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Course - Open Console (F12) to see output</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; margin-bottom: 20px; }
    .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button { padding: 10px 20px; background: #4361ee; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 4px; }
    input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; margin: 4px; }
    ul { padding-left: 20px; }
    li { padding: 6px 0; cursor: pointer; }
    li.done { text-decoration: line-through; color: #aaa; }
  </style>
</head>
<body>
  <h1>Open browser console (F12) to see JavaScript output</h1>
  <div class="box" id="my-element">Hello, I'm a DOM element!</div>
  <div class="box">
    <h2>Interactive Demo</h2>
    <button id="myButton">Click Me!</button>
    <button id="submit-btn">Submit</button>
    <input type="text" placeholder="Type something..." />
    <ul id="todo-list">
      <li>Todo Item 1</li>
      <li>Todo Item 2 <button class="delete-btn">Delete</button></li>
      <li>Todo Item 3</li>
    </ul>
  </div>
  <div class="box parent">
    <div id="outer" style="padding:20px;background:#f0f0f0">
      Outer div
      <div id="inner" style="padding:20px;background:#e0e0e0;margin-top:10px">
        Inner div
        <button>Click (watch bubbling!)</button>
      </div>
    </div>
  </div>
  <form id="registration-form" class="box">
    <h2>Form</h2>
    <input name="name" placeholder="Name" /><br/><br/>
    <input name="email" placeholder="Email" /><br/><br/>
    <input name="password" type="password" id="password" placeholder="Password" /><br/><br/>
    <input name="confirmPassword" type="password" placeholder="Confirm Password" /><br/><br/>
    <input name="age" type="number" placeholder="Age" /><br/><br/>
    <button type="submit">Submit</button>
  </form>
  <script src="index.js"></script>
</body>
</html>
